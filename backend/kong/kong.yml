_format_version: "3.0"
_transform: true

services:
  # 1. Analytics Service (Trong ảnh thư mục là Analytics-service)
  - name: analytics-service
    url: http://analytics-service:8081
    routes:
      - name: analytics-route
        paths:
          - /analytics
        strip_path: true

  # 2. Event Service (Trong ảnh thư mục là Event-service)
  - name: event-service
    url: http://event-service:8082
    routes:
      - name: event-route
        paths:
          - /events
        strip_path: true

  # 3. Identity Service
  - name: identity-service
    url: http://identity-service:8083
    routes:
      - name: identity-route
        paths:
          - /identity
        strip_path: true

  # 4. Lucky Draw Service
  - name: lucky-draw-service
    url: http://lucky-draw-service:8084
    routes:
      - name: lucky-draw-route
        paths:
          - /lucky-draw
        strip_path: true

  # 5. Notification Service
  - name: notification-service
    url: http://notification-service:8085
    routes:
      - name: notification-route
        paths:
          - /notification
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      credentials: true
      max_age: 3600