# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=${PORT:8083}
spring.application.name=identity-service

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3309/identity_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET:ouhPBmsFWNGn1/QKWEsm/2WMB4CAt4yFGv/3qYaWD4xa5DmoBD/ACvY3oVcBZmsVLl03mVuRLJ9QsKoA3Q0osg==}
jwt.expiration=${JWT_EXPIRATION:3600}
jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION:7200}

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.src.main.identityservice=DEBUG

# ===============================
# AWS S3 CONFIGURATION
# ===============================
aws.s3.access-key=${AWS_S3_ACCESS_KEY:your-access-key}
aws.s3.secret-key=${AWS_S3_SECRET_KEY:your-secret-key}
aws.s3.region=${AWS_S3_REGION:ap-southeast-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:moon-s3-demo}