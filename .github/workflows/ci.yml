name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ repo về. 
      # Không dùng thuộc tính 'path' ở đây để tránh bị lồng folder Event-Management-Portal/Event-Management-Portal
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Khởi tạo môi trường Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # Bước 3: Cài đặt dependencies
      # Sử dụng working-directory để nhảy vào đúng folder frontend chứa package.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      # Bước 4: Build project
      - name: Build project
        working-directory: ./frontend
        run: npm run build
