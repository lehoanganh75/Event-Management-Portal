version: '3.8'

services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - micro-network
    healthcheck:
      test: [ "CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s    # Kiểm tra mỗi 10 giây
      timeout: 10s     # Chờ phản hồi tối đa 10 giây
      retries: 10      # Thử lại 10 lần trước khi báo lỗi
      start_period: 60s

  mongodb:
    image: mongo:7
    container_name: mongodb-server
    restart: always
    ports:
      - "27020:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - micro-network

  redis:
    image: redis:7-alpine
    container_name: redis-server
    restart: always
    ports:
      - "6379:6379"
    networks:
      - micro-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-server
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - micro-network

  discovery-server:
    build: ./Discovery-service
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - micro-network

  analytics-service:
    build: ./Analytics-service
    container_name: analytics-service
    restart: always
    command: [ "sh", "-c", "sleep 15 && java -jar app.jar" ]
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/analytics_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - micro-network

  event-service:
    build: ./Event-service
    container_name: event-service
    command: [ "sh", "-c", "sleep 15 && java -jar app.jar" ]
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/event_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - micro-network

  identity-service:
    build: ./Identity-service
    container_name: identity-service
    command: [ "sh", "-c", "sleep 20 && java -jar app.jar" ]
    ports:
      - "8082:8082"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/identity_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mariadb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - micro-network

  lucky-draw-service:
    build: ./Lucky-draw-service
    container_name: lucky-draw-service
    command: [ "sh", "-c", "sleep 20 && java -jar app.jar" ]
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/lucky_draw_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - micro-network

  notification-service:
    build: ./Notification-service
    container_name: notification-service
    command: [ "sh", "-c", "sleep 20 && java -jar app.jar" ]
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/notification_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mariadb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - micro-network

  gateway-service:
    build: ./Gateway-service
    container_name: gateway-service
    ports:
      - "8888:8888"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      - discovery-server
    networks:
      - micro-network

networks:
  micro-network:
    driver: bridge

volumes:
  mariadb_data:
  mongo_data: