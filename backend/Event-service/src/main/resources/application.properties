# ===============================================================
# SERVER & APPLICATION CONFIGURATION
# ===============================================================
server.port=${PORT:8082}
spring.application.name=${SPRING_APPLICATION_NAME:event-service}

# ===============================================================
# DATABASE CONFIGURATION (MariaDB)
# ===============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3309/event_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10

# ===============================================================
# JPA / HIBERNATE CONFIGURATION
# ===============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

spring.jackson.deserialization.fail-on-null-for-primitives=false

# ===============================================================
# SECURITY & JWT CONFIGURATION
# ===============================================================
jwt.secret=${JWT_SECRET:}

# ===============================================================
# KAFKA CONFIGURATION
# ===============================================================
spring.kafka.producer.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

logging.level.org.apache.kafka=DEBUG
logging.level.org.springframework.kafka=DEBUG

# ================== EMAIL CONFIGURATION ==================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:hiennguyenbuitan@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===============================================================
# REDIS CONFIGURATION
# ===============================================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ===============================================================
# LOGGING CONFIGURATION
# ===============================================================
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
spring.jackson.serialization.fail-on-empty-beans=false

# ===============================================================
# GEMINI AI CONFIGURATION
# ===============================================================
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# =================================================================
# S3 CONFIGURATION
# =================================================================
aws.s3.access-key=${AWS_S3_ACCESS_KEY:}
aws.s3.secret-key=${AWS_S3_SECRET_KEY:}
aws.s3.region=${AWS_S3_REGION:ap-southeast-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:moon-s3-demo}
