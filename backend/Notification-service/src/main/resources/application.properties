# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=${PORT:8085}
spring.application.name=${SPRING_APPLICATION_NAME:notification-service}

# ===============================
# DATABASE CONFIGURATION (MariaDB)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3309/notification_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jackson.deserialization.fail-on-null-for-primitives=false

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ===============================================================
# SECURITY & JWT CONFIGURATION
# ===============================================================
jwt.secret=${JWT_SECRET:ouhPBmsFWNGn1/QKWEsm/2WMB4CAt4yFGv/3qYaWD4xa5DmoBD/ACvY3oVcBZmsVLl03mVuRLJ9QsKoA3Q0osg==}

# ===============================
# HIKARI CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# ===============================
# KAFKA CONFIGURATION
# ===============================
spring.kafka.consumer.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_GROUP_ID:notification-group-v5}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

logging.level.org.springframework.kafka=ERROR
logging.level.org.apache.kafka.clients.NetworkClient=INFO
logging.level.org.apache.kafka.clients.FetchSessionHandler=INFO


