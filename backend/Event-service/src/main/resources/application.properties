# ===============================================================
# SERVER & APPLICATION CONFIGURATION
# ===============================================================
server.port=8081
spring.application.name=event-service

# ===============================================================
# DATABASE CONFIGURATION (MariaDB)
# ===============================================================
# spring.datasource.url=jdbc:mariadb://mariadb:3306/event_db
spring.datasource.url=jdbc:mariadb://localhost:3306/event_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=10

# ===============================================================
# JPA / HIBERNATE CONFIGURATION
# ===============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Jackson Configuration
spring.jackson.deserialization.fail-on-null-for-primitives=false

# ===============================================================
# SECURITY & JWT CONFIGURATION
# ===============================================================
jwt.secret=ouhPBmsFWNGn1/QKWEsm/2WMB4CAt4yFGv/3qYaWD4xa5DmoBD/ACvY3oVcBZmsVLl03mVuRLJ9QsKoA3Q0osg==

# ===============================================================
# SERVICE DISCOVERY (EUREKA)
# ===============================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ===============================================================
# LOGGING CONFIGURATION
# ===============================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG